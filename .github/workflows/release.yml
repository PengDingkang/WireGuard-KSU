name: Release Module

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag (e.g. v1.0.0)
        required: false
        type: string
      prerelease:
        description: Mark as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu

      - name: Read module metadata
        id: meta
        run: |
          module_version="$(sed -n 's/^version=//p' module.prop)"
          tag_name="${{ github.event.inputs.tag_name }}"
          [ -z "$tag_name" ] && tag_name="$module_version"
          package_name="WireGuard-KSU-${module_version}.zip"
          echo "module_version=${module_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=WireGuard KSU ${module_version}" >> "$GITHUB_OUTPUT"

      - name: Validate shell scripts
        run: |
          sh -n customize.sh
          sh -n boot-completed.sh
          sh -n uninstall.sh
          sh -n wgksu

      - name: Build wg tool for aarch64
        run: |
          git clone --depth 1 https://git.zx2c4.com/wireguard-tools /tmp/wg-build
          cd /tmp/wg-build/src
          make -j"$(nproc)" CC=aarch64-linux-gnu-gcc LDFLAGS="-static" PLATFORM=linux wg
          aarch64-linux-gnu-strip wg
          cp wg "$GITHUB_WORKSPACE/wg"

      - name: Create release package
        run: |
          mkdir -p dist
          zip -qr "dist/${{ steps.meta.outputs.package_name }}" \
            META-INF webroot \
            boot-completed.sh customize.sh uninstall.sh \
            wgksu wg wg0.conf.example \
            module.prop

      - name: Generate update JSON
        run: |
          cat > dist/update.json <<EOF
          {
            "version": "${{ steps.meta.outputs.module_version }}",
            "versionCode": $(sed -n 's/^versionCode=//p' module.prop),
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag_name }}/${{ steps.meta.outputs.package_name }}",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/changelog.md"
          }
          EOF

      - name: Update repository update.json
        if: ${{ !github.event.inputs.prerelease }}
        run: |
          cp dist/update.json update.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || git commit -m "Update update.json for ${{ steps.meta.outputs.tag_name }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: dist/${{ steps.meta.outputs.package_name }}
          generate_release_notes: true
